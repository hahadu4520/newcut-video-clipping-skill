name: validate

on:
  push:
  pull_request:

jobs:
  public-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-public.mjs
      - run: node -e "import('./scripts/runtime/packages/newcut-core/src/index.mjs')"
